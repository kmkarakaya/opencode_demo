<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Murat Karakaya Akademi</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #000;
    color: #e8eaed;
    min-height: 100vh;
    padding-top: 42px;
  }
  /* Başlangıç ekranı (Google benzeri) */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 28px;
  }
  #home .logo {
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -2px;
    text-align: center;
    color: #4285F4;
  }
  #home .logo span:nth-child(2) { color: #EA4335; }
  #home .logo span:nth-child(3) { color: #FBBC05; }
  #home .logo span:nth-child(4) { color: #4285F4; }
  #home .logo span:nth-child(5) { color: #34A853; }
  #home .logo span:nth-child(6) { color: #EA4335; }
  .search-box {
    display: flex;
    align-items: center;
    width: min(580px, 90vw);
    border: 1px solid #5f6368;
    border-radius: 24px;
    padding: 12px 18px;
    background: #202124;
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .search-box:focus-within { box-shadow: 0 1px 10px rgba(32,33,36,0.28); }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
    color: #e8eaed;
  }
  .search-box button {
    border: none;
    background: #4285F4;
    color: #fff;
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 14px;
    cursor: pointer;
  }
  .credit {
    font-size: 13px;
    color: #9aa0a6;
  }

  /* Sohbet ekranı */
  #chat { display: none; flex-direction: column; height: 100vh; }
  #chat .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid #3c4043;
    font-size: 18px;
    font-weight: 500;
    color: #8ab4f8;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  #chat .topbar .back { font-size: 13px; color: #9aa0a6; cursor: pointer; }
  #chat .topbar select {
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid #5f6368;
    border-radius: 6px;
    background: #202124;
    color: #e8eaed;
    cursor: pointer;
    max-width: 200px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: #4285F4; color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #202124; color: #e8eaed; border-bottom-left-radius: 4px; }
  .msg.bot pre { background: #303134; padding: 10px; border-radius: 6px; overflow-x: auto; }
  .msg.bot code { background: #303134; padding: 2px 4px; border-radius: 4px; }
  .msg.bot pre code { background: none; padding: 0; }
  .msg.bot table { border-collapse: collapse; margin: 8px 0; }
  .msg.bot th, .msg.bot td { border: 1px solid #5f6368; padding: 6px 10px; }
  #inputbar {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid #3c4043;
  }
  #inputbar input {
    flex: 1;
    border: 1px solid #5f6368;
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 16px;
    outline: none;
    background: #202124;
    color: #e8eaed;
  }
  #inputbar button {
    border: none;
    background: #4285F4;
    color: #fff;
    border-radius: 24px;
    padding: 0 22px;
    font-size: 15px;
    cursor: pointer;
  }
  #inputbar button:disabled { opacity: 0.6; cursor: default; }
  .typing { font-style: italic; color: #70757a; }
  .msg .time {
    display: block;
    font-size: 11px;
    margin-top: 6px;
    opacity: 0.6;
    text-align: right;
  }
  .msg.user .time { color: #e8f0fe; }
  .msg.bot .time { color: #9aa0a6; }
  #banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    color: #8ab4f8;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    padding: 10px 16px;
    border-bottom: 1px solid #3c4043;
    z-index: 100;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div id="home">
  <div class="logo"><span>M</span><span>u</span><span>r</span><span>a</span><span>t</span> <span>K</span>arakaya Akademi</div>
  <div class="search-box">
    <input id="homeInput" type="text" placeholder="Bir soru sorun..." autocomplete="off" />
    <button id="homeBtn">Gönder</button>
  </div>
  <div class="credit">Murat Karakaya Akademi tarafından yapıldı</div>
</div>

<div id="banner">Murat Karakaya Akademi · Yapay Zeka ile Sohbet</div>

<div id="chat">
  <div class="topbar">
    <span>Murat Karakaya Akademi</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <select id="modelSelect">
        <option value="gemma-4-12B-it-MLX-8bit">gemma-4-12B-it-MLX-8bit</option>
        <option value="Qwen3.6-35B-A3B-MLX-8bit">Qwen3.6-35B-A3B-MLX-8bit</option>
        <option value="gemma-4-26B-A4B-it-MLX-8bit">gemma-4-26B-A4B-it-MLX-8bit</option>
      </select>
      <span class="back" id="backBtn">Ana ekrana dön</span>
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputbar">
    <input id="chatInput" type="text" placeholder="Mesajınızı yazın..." autocomplete="off" />
    <button id="sendBtn">Gönder</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const homeInput = document.getElementById("homeInput");
  const chatInput = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");
  const history = [];

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    if (role === "bot") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    const time = document.createElement("span");
    time.className = "time";
    time.textContent = new Date().toLocaleString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    div.appendChild(time);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showChat() {
    document.getElementById("home").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    chatInput.focus();
  }

  async function send(text) {
    if (!text.trim()) return;
    addMessage("user", text);
    history.push({ role: "user", content: text });
    chatInput.value = "";
    sendBtn.disabled = true;

    const typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.textContent = "Yazıyor...";
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const resp = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, model: document.getElementById("modelSelect").value }),
      });
      const data = await resp.json();
      messagesEl.removeChild(typing);
      if (!resp.ok) {
        addMessage("bot", "Hata: " + (data.detail || "Bilinmeyen hata"));
      } else {
        addMessage("bot", data.reply);
        history.push({ role: "assistant", content: data.reply });
      }
    } catch (e) {
      messagesEl.removeChild(typing);
      addMessage("bot", "Bağlantı hatası: " + e);
    } finally {
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  document.getElementById("homeBtn").addEventListener("click", () => {
    const t = homeInput.value;
    if (t.trim()) { showChat(); send(t); }
  });
  homeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { const t = homeInput.value; if (t.trim()) { showChat(); send(t); } }
  });
  sendBtn.addEventListener("click", () => send(chatInput.value));
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send(chatInput.value);
  });
  document.getElementById("backBtn").addEventListener("click", () => {
    document.getElementById("chat").style.display = "none";
    document.getElementById("home").style.display = "flex";
    homeInput.focus();
  });
</script>
</body>
</html>
