<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Murat Karakaya Akademi</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000;
    --fg: #e8eaed;
    --panel: #202124;
    --panel-alt: #303134;
    --border: #5f6368;
    --border-soft: #3c4043;
    --muted: #9aa0a6;
    --accent: #4285F4;
    --accent-soft: #8ab4f8;
    --user-text: #fff;
    --user-time: #e8f0fe;
    --bot-time: #9aa0a6;
    --typing: #70757a;
    --banner-bg: #1a1a1a;
    --credit: #9aa0a6;
  }
  body.light {
    --bg: #fff;
    --fg: #202124;
    --panel: #fff;
    --panel-alt: #f1f3f4;
    --border: #dadce0;
    --border-soft: #eee;
    --muted: #70757a;
    --accent: #1a73e8;
    --accent-soft: #1a73e8;
    --user-text: #fff;
    --user-time: #e8f0fe;
    --bot-time: #5f6368;
    --typing: #70757a;
    --banner-bg: #f1f3f4;
    --credit: #70757a;
  }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    padding-top: 42px;
    transition: background 0.2s, color 0.2s;
  }
  /* Başlangıç ekranı (Google benzeri) */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 28px;
  }
  #home .logo {
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -2px;
    text-align: center;
    color: var(--accent);
  }
  #home .logo span:nth-child(2) { color: #EA4335; }
  #home .logo span:nth-child(3) { color: #FBBC05; }
  #home .logo span:nth-child(4) { color: var(--accent); }
  #home .logo span:nth-child(5) { color: #34A853; }
  #home .logo span:nth-child(6) { color: #EA4335; }
  .search-box {
    display: flex;
    align-items: center;
    width: min(580px, 90vw);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    background: var(--panel);
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .search-box:focus-within { box-shadow: 0 1px 10px rgba(32,33,36,0.28); }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
    color: var(--fg);
  }
  .search-box button {
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 14px;
    cursor: pointer;
  }
  .credit {
    font-size: 13px;
    color: var(--credit);
  }

  /* Sohbet ekranı */
  #chat { display: none; flex-direction: column; height: 100vh; }
  #chat .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  #chat .topbar .back { font-size: 13px; color: var(--muted); cursor: pointer; }
  #chat .topbar select {
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    max-width: 200px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel); color: var(--fg); border-bottom-left-radius: 4px; }
  .msg.bot pre { background: var(--panel-alt); padding: 10px; border-radius: 6px; overflow-x: auto; }
  .msg.bot code { background: var(--panel-alt); padding: 2px 4px; border-radius: 4px; }
  .msg.bot pre code { background: none; padding: 0; }
  .msg.bot table { border-collapse: collapse; margin: 8px 0; }
  .msg.bot th, .msg.bot td { border: 1px solid var(--border); padding: 6px 10px; }
  #inputbar {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border-soft);
  }
  #inputbar input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 16px;
    outline: none;
    background: var(--panel);
    color: var(--fg);
  }
  #inputbar button {
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: 24px;
    padding: 0 22px;
    font-size: 15px;
    cursor: pointer;
  }
  #inputbar button:disabled { opacity: 0.6; cursor: default; }
  .typing { font-style: italic; color: var(--typing); }
  .msg .time {
    display: block;
    font-size: 11px;
    margin-top: 6px;
    opacity: 0.6;
    text-align: right;
  }
  .msg.user .time { color: var(--user-time); }
  .msg.bot .time { color: var(--bot-time); }
  #banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--banner-bg);
    color: var(--accent-soft);
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-soft);
    z-index: 100;
    letter-spacing: 0.3px;
  }
  #themeToggle {
    position: fixed;
    top: 8px;
    right: 12px;
    z-index: 101;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  #sidebar {
    position: fixed;
    top: 42px;
    left: 0;
    bottom: 0;
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    z-index: 90;
    transform: translateX(-100%);
    transition: transform 0.2s;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar .side-head {
    padding: 12px;
    display: flex;
    gap: 8px;
  }
  #sidebar .new-chat {
    flex: 1;
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: 20px;
    padding: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  #sidebar .sessions {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #sidebar .session-item {
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--panel-alt);
    cursor: pointer;
    font-size: 13px;
    color: var(--fg);
  }
  #sidebar .session-item:hover { opacity: 0.85; }
  #sidebar .session-item.active { outline: 2px solid var(--accent); }
  #sidebar .session-item .st { font-size: 11px; color: var(--muted); margin-top: 3px; }
  #sidebar .session-item .del {
    float: right;
    color: var(--muted);
    font-size: 12px;
  }
  #menuBtn {
    position: fixed;
    top: 8px;
    left: 12px;
    z-index: 101;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  body.sidebar-open #home, body.sidebar-open #chat { padding-left: 240px; }
</style>
</head>
<body>

<button id="menuBtn">☰ Sohbetler</button>

<div id="sidebar">
  <div class="side-head">
    <button class="new-chat" id="newChatBtn">+ Yeni Sohbet</button>
  </div>
  <div class="sessions" id="sessionList"></div>
</div>

<div id="home">
  <div class="logo"><span>M</span><span>u</span><span>r</span><span>a</span><span>t</span> <span>K</span>arakaya Akademi</div>
  <div class="search-box">
    <input id="homeInput" type="text" placeholder="Bir soru sorun..." autocomplete="off" />
    <button id="homeBtn">Gönder</button>
  </div>
  <div class="credit">Murat Karakaya Akademi tarafından yapıldı</div>
</div>

<div id="banner">Murat Karakaya Akademi · Yapay Zeka ile Sohbet</div>
<button id="themeToggle">☀️ Açık Tema</button>

<div id="chat">
  <div class="topbar">
    <span>Murat Karakaya Akademi</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <select id="modelSelect">
        <option value="gemma-4-12B-it-MLX-8bit">gemma-4-12B-it-MLX-8bit</option>
        <option value="Qwen3.6-35B-A3B-MLX-8bit">Qwen3.6-35B-A3B-MLX-8bit</option>
        <option value="gemma-4-26B-A4B-it-MLX-8bit">gemma-4-26B-A4B-it-MLX-8bit</option>
      </select>
      <span class="back" id="backBtn">Ana ekrana dön</span>
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputbar">
    <input id="chatInput" type="text" placeholder="Mesajınızı yazın..." autocomplete="off" />
    <button id="sendBtn">Gönder</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const homeInput = document.getElementById("homeInput");
  const chatInput = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");
  const sessionListEl = document.getElementById("sessionList");
  let history = [];
  let currentSessionId = null;

  const themeToggle = document.getElementById("themeToggle");
  function applyTheme(theme) {
    if (theme === "light") {
      document.body.classList.add("light");
      themeToggle.textContent = "🌙 Koyu Tema";
    } else {
      document.body.classList.remove("light");
      themeToggle.textContent = "☀️ Açık Tema";
    }
  }
  applyTheme(localStorage.getItem("theme") || "dark");
  themeToggle.addEventListener("click", () => {
    const next = document.body.classList.contains("light") ? "dark" : "light";
    localStorage.setItem("theme", next);
    applyTheme(next);
  });

  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  menuBtn.addEventListener("click", () => {
    sidebar.classList.toggle("open");
    document.body.classList.toggle("sidebar-open");
  });

  function clearMessages() { messagesEl.innerHTML = ""; }

  async function loadSessions() {
    try {
      const resp = await fetch("/api/sessions");
      const sessions = await resp.json();
      sessionListEl.innerHTML = "";
      sessions.forEach((s) => {
        const item = document.createElement("div");
        item.className = "session-item" + (s.id === currentSessionId ? " active" : "");
        item.innerHTML = `<span class="del" data-id="${s.id}">✕</span>${escapeHtml(s.title)}<div class="st">${new Date(s.updated_at).toLocaleString("tr-TR")}</div>`;
        item.addEventListener("click", (e) => {
          if (e.target.classList.contains("del")) return;
          openSession(s.id);
        });
        item.querySelector(".del").addEventListener("click", (e) => {
          e.stopPropagation();
          deleteSession(s.id);
        });
        sessionListEl.appendChild(item);
      });
    } catch (e) { /* yoksay */ }
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  async function openSession(sid) {
    currentSessionId = sid;
    try {
      const resp = await fetch("/api/sessions/" + sid);
      const data = await resp.json();
      history = data.messages;
    } catch (e) {
      history = [];
    }
    clearMessages();
    history.forEach((m) => addMessage(m.role, m.content));
    document.getElementById("home").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    loadSessions();
    chatInput.focus();
  }

  async function deleteSession(sid) {
    await fetch("/api/sessions/" + sid, { method: "DELETE" });
    if (currentSessionId === sid) { currentSessionId = null; history = []; clearMessages(); }
    loadSessions();
  }

  async function newSession() {
    const resp = await fetch("/api/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: "Yeni Sohbet" }),
    });
    const s = await resp.json();
    currentSessionId = s.id;
    history = [];
    clearMessages();
    document.getElementById("home").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    loadSessions();
    chatInput.focus();
  }
  document.getElementById("newChatBtn").addEventListener("click", newSession);

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    if (role === "bot") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    const time = document.createElement("span");
    time.className = "time";
    time.textContent = new Date().toLocaleString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    div.appendChild(time);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showChat() {
    document.getElementById("home").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    chatInput.focus();
  }

  async function send(text) {
    if (!text.trim()) return;
    if (!currentSessionId) { await newSession(); }
    addMessage("user", text);
    history.push({ role: "user", content: text });
    chatInput.value = "";
    sendBtn.disabled = true;

    const typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.textContent = "Yazıyor...";
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const resp = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, model: document.getElementById("modelSelect").value, session_id: currentSessionId }),
      });
      const data = await resp.json();
      messagesEl.removeChild(typing);
      if (!resp.ok) {
        addMessage("bot", "Hata: " + (data.detail || "Bilinmeyen hata"));
      } else {
        addMessage("bot", data.reply);
        history.push({ role: "assistant", content: data.reply });
        loadSessions();
      }
    } catch (e) {
      messagesEl.removeChild(typing);
      addMessage("bot", "Bağlantı hatası: " + e);
    } finally {
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  document.getElementById("homeBtn").addEventListener("click", () => {
    const t = homeInput.value;
    if (t.trim()) { showChat(); send(t); }
  });
  homeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { const t = homeInput.value; if (t.trim()) { showChat(); send(t); } }
  });
  sendBtn.addEventListener("click", () => send(chatInput.value));
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send(chatInput.value);
  });
  document.getElementById("backBtn").addEventListener("click", () => {
    document.getElementById("chat").style.display = "none";
    document.getElementById("home").style.display = "flex";
    homeInput.focus();
  });

  loadSessions();
</script>
</body>
</html>
